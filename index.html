  <script type="module">
    let studentLoginInFlight = false;
    let adminLoginInFlight = false;

    function checkSavedSession() {
      const sessionStr = mySessionStorage.getItem('cbt-session');
      if (sessionStr) {
        try {
          const user = JSON.parse(sessionStr);
          if (user.role === 'admin') {
            window.location.href = 'admin.html';
          } else if (user.role === 'student') {
            window.location.href = 'ujian.html';
          }
        } catch (err) {
          mySessionStorage.removeItem('cbt-session');
        }
      }
    }

    async function handleStudentLogin(e) {
      e.preventDefault();
      if (studentLoginInFlight) return;
      studentLoginInFlight = true;
      try {
        const nisEl = document.getElementById('login-nis');
        const pwEl = document.getElementById('login-password');
        const tokenEl = document.getElementById('login-token');
        if (!nisEl || !pwEl || !tokenEl) {
          throw new Error('Form login tidak siap. Muat ulang halaman.');
        }

        const nis = nisEl.value.trim();
        const password = pwEl.value;
        const token = tokenEl.value.trim().toUpperCase();

        if (typeof hideAuthLoginStatus === 'function') hideAuthLoginStatus();
        toggleLoader(true, "MEMVERIFIKASI...");

        if (typeof verifyStudentLoginCredentials !== 'function') {
          throw new Error('Modul validasi login tidak tersedia.');
        }

        const result = await verifyStudentLoginCredentials({ nis, password, token });
        if (!result.ok) {
          if (typeof showAuthLoginStatus === 'function') showAuthLoginStatus(result);
          return;
        }

        const {
          schedule,
          scheduleId,
          student: st,
          token: trimmedToken,
          isResume,
          resumeProgress
        } = result;

        if (!schedule?.id_paket || !scheduleId || !st?.nis) {
          throw new Error('Respons login tidak lengkap. Coba lagi atau hubungi proktor.');
        }

        if (isResume) {
          mySessionStorage.setItem('cbt-resume-exam', '1');
        } else {
          mySessionStorage.removeItem('cbt-resume-exam');
        }

        const userObj = {
          nis: st.nis,
          nama: st.nama,
          kelas: st.kelas,
          role: 'student',
          activeScheduleId: scheduleId,
          activePacketId: schedule.id_paket,
          token: trimmedToken
        };
        mySessionStorage.setItem('cbt-session', JSON.stringify(userObj));
        mySessionStorage.setItem('cbt-schedule', JSON.stringify(schedule));
        if (resumeProgress) {
          mySessionStorage.setItem('cbt-resume-progress', JSON.stringify(resumeProgress));
        } else {
          mySessionStorage.removeItem('cbt-resume-progress');
        }
        window.location.href = 'ujian.html';
      } catch (err) {
        if (typeof showAuthLoginStatus === 'function') {
          showAuthLoginStatus({
            variant: 'error',
            title: 'Verifikasi Gagal',
            message: err.message || 'Terjadi kesalahan saat memverifikasi data.'
          });
        }
      } finally {
        studentLoginInFlight = false;
        toggleLoader(false);
      }
    }

    async function handleAdminLogin(e) {
      e.preventDefault();
      if (adminLoginInFlight) return;
      adminLoginInFlight = true;
      const eb = document.getElementById('admin-error-banner');
      const et = document.getElementById('admin-error-message');
      try {
        const userEl = document.getElementById('admin-username');
        const passEl = document.getElementById('admin-password');
        if (!userEl || !passEl || !eb || !et) {
          throw new Error('Form admin tidak siap. Muat ulang halaman.');
        }
        const user = userEl.value.trim();
        const pass = passEl.value;
        if (!user || !pass) {
          et.innerText = "Username dan password admin harus diisi.";
          eb.classList.remove('hidden');
          return;
        }
        eb.classList.add('hidden');
        toggleLoader(true, "AUTENTIKASI...");
        const as = await getDoc(getPublicDoc("Admin", user));
        if (as.exists() && as.data().password === pass) {
          const adminObj = { username: user, role: 'admin' };
          mySessionStorage.setItem('cbt-session', JSON.stringify(adminObj));
          document.getElementById('admin-auth-modal').classList.add('hidden');
          window.location.href = 'admin.html';
        } else throw new Error("Kredensial Salah.");
      } catch (err) {
        if (et && eb) {
          et.innerText = err.message || 'Autentikasi gagal.';
          eb.classList.remove('hidden');
        }
      } finally {
        adminLoginInFlight = false;
        toggleLoader(false);
      }
    }

    function setupInteractiveListeners() {

      const toggleAuthPwdBtn = document.getElementById('toggle-auth-password');
      if (toggleAuthPwdBtn) {
        toggleAuthPwdBtn.addEventListener('click', () => {
          const pwdInput = document.getElementById('login-password');
          if (pwdInput) {
            pwdInput.type = pwdInput.type === 'password' ? 'text' : 'password';
          }
        });
      }

      const toggleAdminPwdBtn = document.getElementById('toggle-admin-password');
      if (toggleAdminPwdBtn) {
        toggleAdminPwdBtn.addEventListener('click', () => {
          const pwdInput = document.getElementById('admin-password');
          if (pwdInput) {
            pwdInput.type = pwdInput.type === 'password' ? 'text' : 'password';
          }
        });
      }

      const toggleThemeAuthBtn = document.getElementById('toggle-theme-auth');
      if (toggleThemeAuthBtn) {
        toggleThemeAuthBtn.addEventListener('click', toggleTheme);
      }

      const triggerAdminModalBtn = document.getElementById('btn-trigger-admin-modal');
      const adminModal = document.getElementById('admin-auth-modal');
      const studentLoginPanel = document.getElementById('student-login-panel');
      if (triggerAdminModalBtn && adminModal) {
        triggerAdminModalBtn.addEventListener('click', () => {
          adminModal.classList.remove('hidden');
          if (studentLoginPanel) studentLoginPanel.classList.add('hidden');
        });
      }

      const closeAdminModalBtn = document.getElementById('btn-close-admin-modal');
      if (closeAdminModalBtn && adminModal) {
        closeAdminModalBtn.addEventListener('click', () => {
          adminModal.classList.add('hidden');
          if (studentLoginPanel) studentLoginPanel.classList.remove('hidden');
        });
      }

      const studentForm = document.getElementById('student-login-form');
      if (studentForm) {
        studentForm.addEventListener('submit', (e) => {

          authInputStatePushed = false;
          handleStudentLogin(e);
        });
        studentForm.querySelectorAll('input').forEach((input) => {
          input.addEventListener('input', () => {
            if (typeof hideAuthLoginStatus === 'function') hideAuthLoginStatus();
          });
        });
      }

      const adminForm = document.getElementById('admin-login-form');
      if (adminForm) {
        adminForm.addEventListener('submit', (e) => {
          authInputStatePushed = false;
          handleAdminLogin(e);
        });
      }

      let authInputStatePushed = false;
      const authInputs = document.querySelectorAll('#student-login-form input, #admin-login-form input');

      authInputs.forEach((input) => {
        input.addEventListener('focus', () => {
          window.focus();
          if (window.innerWidth < 768 && !authInputStatePushed) {
            authInputStatePushed = true;
            history.pushState({ authInputFocus: true }, '');
          }
        });

        input.addEventListener('blur', () => {
          setTimeout(() => {
            const activeEl = document.activeElement;
            const isStillInput = activeEl && (activeEl.tagName === 'INPUT' || activeEl.tagName === 'TEXTAREA');
            if (!isStillInput && authInputStatePushed) {
              authInputStatePushed = false;

              history.back();
            }
          }, 150);
        });
      });

      window.addEventListener('popstate', (e) => {
        if (authInputStatePushed) {
          authInputStatePushed = false;
          const activeEl = document.activeElement;
          if (activeEl && (activeEl.tagName === 'INPUT' || activeEl.tagName === 'TEXTAREA')) {
            activeEl.blur();
          }
        }
      });

      document.querySelectorAll('#student-login-form .relative, #admin-login-form .relative').forEach(container => {
        container.addEventListener('click', function (e) {
          if (e.target.tagName === 'INPUT') return;
          const input = this.querySelector('input');
          if (input) input.focus();
        });
      });
    }

    window.addEventListener('DOMContentLoaded', async () => {

      try {
        if (document.fullscreenElement || document.webkitFullscreenElement || document.mozFullScreenElement || document.msFullscreenElement) {
          const exitFs = document.exitFullscreen || document.webkitExitFullscreen || document.mozCancelFullScreen || document.msExitFullscreen;
          if (exitFs) await exitFs.call(document);
        }
      } catch (e) {
        console.warn('Gagal keluar fullscreen otomatis:', e);
      }
      window.focus();

      try {
        if (typeof lucide !== 'undefined' && lucide.createIcons) lucide.createIcons();
      } catch (e) {
        console.warn('lucide.createIcons failed', e);
      }
      initRealtimeClock();
      applyTheme();
      initAppSettingsElements();
      try {
        if (typeof initAppSettings === 'function') await initAppSettings();
      } catch (err) {
        console.warn('initAppSettings failed', err);
      }
      renderAppSettingsUI();
      if (typeof initAdminHeaderAutoFit === 'function') initAdminHeaderAutoFit();
      if (typeof refreshAppSettingsFromCloud === 'function') refreshAppSettingsFromCloud();
      const resetMsg = mySessionStorage.getItem('cbt-proctor-reset-msg');
      if (resetMsg) {
        mySessionStorage.removeItem('cbt-proctor-reset-msg');
        if (typeof showAuthLoginStatus === 'function') {
          showAuthLoginStatus({
            variant: 'info',
            title: 'Sesi Direset',
            message: resetMsg,
            lucideIcon: 'refresh-cw'
          });
        }
      } else {

        mySessionStorage.removeItem('cbt-resume-exam');
      }
      const loginStatusMsg = mySessionStorage.getItem('cbt-login-status-msg');
      if (loginStatusMsg) {
        mySessionStorage.removeItem('cbt-login-status-msg');
        try {
          const payload = JSON.parse(loginStatusMsg);
          if (typeof showAuthLoginStatus === 'function') showAuthLoginStatus(payload);
        } catch (parseErr) {
          if (typeof showAuthLoginStatus === 'function') {
            showAuthLoginStatus({
              variant: 'error',
              title: 'Sesi Error',
              message: loginStatusMsg
            });
          }
        }
      }
      setupInteractiveListeners();
      requestAnimationFrame(() => {
        const nisInput = document.getElementById('login-nis');
        if (nisInput) nisInput.focus();
      });
      try {
        await initAuth();
        checkSavedSession();
      } catch (err) {
        if (typeof showAuthLoginStatus === 'function') {
          showAuthLoginStatus({
            variant: 'error',
            title: 'Koneksi Gagal',
            message: 'Gagal menghubungi server. Periksa koneksi internet dan muat ulang halaman.'
          });
        }
      }
    });
  </script>
</body>

</html>
