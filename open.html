<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="robots" content="noindex, nofollow">
  <title>Membuka CBT...</title>
  <link rel="icon" type="image/png" href="https://iili.io/KSdduPR.png">
  <script>
    (function () {
      var ALLOWED_TARGETS = {
        'index.html': true,
        'ujian.html': true,
        'admin.html': true
      };

      function resolveSafeTarget(raw) {
        var fallback = 'index.html';
        var value = String(raw || '').trim();
        if (!value) return fallback;
        try {

          if (/^[a-zA-Z][a-zA-Z0-9+.-]*:/.test(value) || value.indexOf('//') === 0) {
            return fallback;
          }
          var pathOnly = value.split('?')[0].split('#')[0].replace(/^\.\//, '').replace(/^\//, '');
          var baseName = pathOnly.split('/').pop();
          if (!ALLOWED_TARGETS[baseName]) return fallback;
          return baseName;
        } catch (e) {
          return fallback;
        }
      }

      var params = new URLSearchParams(location.search);
      var targetFile = resolveSafeTarget(params.get('to'));
      var targetUrl = new URL(targetFile, location.href).href;
      var ua = navigator.userAgent || '';
      var isIOS = /iPad|iPhone|iPod/.test(ua)
        || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
      var isAndroid = /Android/i.test(ua);
      var isInApp = /FBAN|FBAV|Instagram|Line\/|MicroMessenger|Twitter|LinkedInApp|Snapchat|wv\)/i.test(ua);
      var isIOSSafari = isIOS && !/CriOS|FxiOS|EdgiOS|OPiOS|Chrome|GSA/.test(ua);
      var isAndroidChrome = isAndroid && /Chrome\/\d+/i.test(ua)
        && !/EdgA|OPR|SamsungBrowser|MiuiBrowser|UCBrowser/i.test(ua);

      function buildAndroidChromeIntent(httpsUrl) {
        try {
          var u = new URL(httpsUrl);
          return 'intent://' + u.host + u.pathname + u.search
            + '#Intent;scheme=https;package=com.android.chrome;S.browser_fallback_url='
            + encodeURIComponent(httpsUrl) + ';end';
        } catch (e) {
          return httpsUrl;
        }
      }

      window.__cbtOpenTargetUrl = targetUrl;

      if (!isAndroid && !isIOS) {
        location.replace(targetUrl);
        return;
      }

      if (isAndroid) {
        if (isAndroidChrome) {
          location.replace(targetUrl);
          return;
        }
        location.replace(buildAndroidChromeIntent(targetUrl));
        window.__cbtOpenNeedsFallback = true;
        return;
      }

      if (isIOSSafari && !isInApp) {
        location.replace(targetUrl);
        return;
      }

      window.__cbtOpenNeedsFallback = true;
    })();
  </script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { background: linear-gradient(160deg, #234198 0%, #0f172a 100%); }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      min-height: 100dvh;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 1.25rem;
      color: #fff;
    }
    body.show-fallback { display: flex; }
    .card {
      width: 100%;
      max-width: 22rem;
      background: rgba(255, 255, 255, 0.97);
      color: #0f172a;
      border-radius: 1.25rem;
      padding: 1.5rem;
      text-align: center;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
    }
    h1 { font-size: 1rem; font-weight: 800; margin-bottom: 0.35rem; color: #234198; }
    p { font-size: 0.82rem; line-height: 1.5; color: #475569; }
    .badge {
      display: inline-block;
      margin-top: 0.75rem;
      padding: 0.25rem 0.65rem;
      border-radius: 999px;
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      background: #eff6ff;
      color: #234198;
    }
    .actions { margin-top: 1rem; display: flex; flex-direction: column; gap: 0.5rem; }
    .btn {
      display: block;
      width: 100%;
      padding: 0.75rem 1rem;
      border: none;
      border-radius: 0.75rem;
      font-size: 0.85rem;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
    }
    .btn-primary { background: #234198; color: #fff; }
    .btn-secondary { background: #f1f5f9; color: #334155; }
    .hint { margin-top: 0.75rem; font-size: 0.72rem; color: #64748b; }
  </style>
</head>

<body>
  <div class="card">
    <h1 id="title">Buka Browser Ujian</h1>
    <p id="message"></p>
    <span class="badge" id="platform-badge"></span>
    <div class="actions">
      <a class="btn btn-primary" id="btn-open" href="#">Buka Halaman Login</a>
      <button type="button" class="btn btn-secondary" id="btn-copy">Salin Link</button>
    </div>
    <p class="hint" id="hint"></p>
  </div>

  <script>
    (function () {
      if (!window.__cbtOpenNeedsFallback) return;

      document.body.classList.add('show-fallback');

      var targetUrl = window.__cbtOpenTargetUrl || 'index.html';
      var ua = navigator.userAgent || '';
      var isIOS = /iPad|iPhone|iPod/.test(ua)
        || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
      var isAndroid = /Android/i.test(ua);

      var el = {
        title: document.getElementById('title'),
        message: document.getElementById('message'),
        badge: document.getElementById('platform-badge'),
        btnOpen: document.getElementById('btn-open'),
        btnCopy: document.getElementById('btn-copy'),
        hint: document.getElementById('hint')
      };

      el.btnOpen.href = targetUrl;

      if (isAndroid) {
        el.badge.textContent = 'Android → Chrome';
        el.message.textContent = 'Jika Chrome tidak terbuka otomatis, ketuk tombol di bawah atau buka link di Google Chrome.';
        el.hint.textContent = 'Disarankan: pasang Chrome dan jadikan browser default.';
      } else if (isIOS) {
        el.badge.textContent = 'iOS → Safari';
        el.message.textContent = 'Browser in-app terdeteksi. Buka link ini di Safari untuk ujian yang aman.';
        el.hint.textContent = 'Tap ⋯ atau Share → "Buka di Safari", atau salin link lalu tempel di Safari.';
      } else {
        el.badge.textContent = 'Browser Ujian';
        el.message.textContent = 'Ketuk tombol di bawah untuk membuka halaman login CBT.';
      }

      el.btnCopy.addEventListener('click', function () {
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(targetUrl).then(function () {
            el.btnCopy.textContent = 'Link Tersalin!';
          }).catch(function () {
            el.btnCopy.textContent = targetUrl;
          });
        } else {
          el.btnCopy.textContent = targetUrl;
        }
      });
    })();
  </script>
</body>

</html>
